# Configuration for krb-ticket-indicator.
# Format: "key = value" per line; '#' starts a comment.
# Edit via the "Settings" menu entry or by hand.

# --- New ticket (defaults for the "New ticket" dialog) ---

# Default principal, prefilled in the dialog.
# Leave empty to use the current cache principal, or kinit's own default.
principal =

# Ticket lifetime (kinit -l). Empty = KDC default. Accepts d/h/m/s, e.g. 10h.
ticket_lifetime =

# Renewable lifetime (kinit -r). Must be >= ticket lifetime. e.g. 7d, 1h30m.
# Only a request: the KDC may clamp it to its max_renewable_life.
renew_lifetime = 7d

# Request a renewable ticket by default (the dialog checkbox starts ticked).
renewable = true

# --- Panel ---

# Minutes of remaining lifetime below which the icon switches to "warning"
# and a one-off "expiring soon" notification is shown.
warn_minutes = 30

# What to show next to the panel icon (both false = icon only).
show_principal = true
show_time = true
